<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Not Found | Terunian LLC</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="favicon_32x32.png" sizes="32x32">
<link rel="icon" type="image/png" href="favicon_16x16.png" sizes="16x16">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Helvetica Neue", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      font-size: 0.95rem;
      line-height: 2.0;
      color: #333;
      background: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 4rem 1.5rem;
      width: 100%;
    }

    /* ─── Header ─── */
    header .container {
      padding-bottom: 0;
    }

    .site-title {
      font-size: 1.5rem;
      font-weight: normal;
      letter-spacing: 0.08em;
      line-height: 1.4;
    }

    .en-name {
      display: block;
      font-size: 0.85rem;
      color: #999;
      letter-spacing: 0.1em;
      margin-top: 0.1em;
    }

    /* ─── Main ─── */
    main {
      flex: 1;
    }

    main .container {
      padding-top: 5rem;
      padding-bottom: 5rem;
    }

    .error-number {
      font-size: 4rem;
      font-weight: 200;
      letter-spacing: 0.05em;
      line-height: 1;
      color: #ccc;
      margin-bottom: 2rem;
    }

    .error-title {
      font-size: 0.95rem;
      letter-spacing: 0.1em;
      color: #333;
      margin-bottom: 1rem;
    }

    .error-message {
      font-size: 0.85rem;
      color: #999;
      letter-spacing: 0.05em;
      line-height: 2.0;
      margin-bottom: 3rem;
    }

    .back-link {
      font-size: 0.85rem;
      color: #333;
      letter-spacing: 0.08em;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .back-link:hover {
      color: #888;
    }

    /* ─── Footer ─── */
    footer .container {
      padding-top: 0;
      border-top: 1px solid #eee;
    }

    footer p {
      font-size: 0.75rem;
      color: #ccc;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <header>
    <div class="container">
      <h1 class="site-title">
        合同会社テルニアン
        <span class="en-name">Terunian LLC</span>
      </h1>
    </div>
  </header>

  <main>
    <div class="container">
      <p class="error-number">404</p>
      <p class="error-title">ページが見つかりません</p>
      <p class="error-message">
        お探しのページは存在しないか、<br>
        移動・削除された可能性があります。
      </p>
      <a class="back-link" href="/">トップページへ</a>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>&copy; Terunian LLC</p>
    </div>
  </footer>

</body>
</html>
